<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DLK Sprint Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --accent:#3b82f6;--accent-dark:#1d4ed8;
  --green:#22c55e;--green-bg:#f0fdf4;--green-text:#166534;
  --red:#ef4444;--red-bg:#fef2f2;--red-text:#991b1b;
  --yellow:#f59e0b;--yellow-bg:#fffbeb;--yellow-text:#92400e;
  --blue-bg:#eff6ff;--blue-text:#1d4ed8;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --hdr:96px
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ---- Header ---- */
header{background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-top{display:flex;align-items:center;gap:20px;height:56px;padding:0 24px;
  border-bottom:1px solid var(--border)}
.logo{font-weight:700;font-size:15px;color:var(--accent);white-space:nowrap}
.logo-sub{font-weight:400;color:var(--muted);font-size:12px;margin-left:6px}

/* ---- Quarter selector ---- */
.qs{position:relative;flex:0 0 220px}
#q-input{width:100%;padding:6px 28px 6px 10px;border:1px solid var(--border);
  border-radius:var(--radius);font-size:13px;background:var(--bg);
  color:var(--text);cursor:pointer;outline:none}
#q-input:focus{border-color:var(--accent)}
.q-arrow{position:absolute;right:9px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--muted);font-size:10px}
.q-dd{display:none;position:absolute;top:calc(100% + 4px);left:0;width:100%;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:280px;overflow-y:auto;z-index:200}
.q-dd.open{display:block}
.q-search{width:100%;padding:8px 10px;border:none;border-bottom:1px solid var(--border);
  font-size:13px;outline:none;background:var(--bg)}
.q-opt{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;
  justify-content:space-between;align-items:center}
.q-opt:hover{background:var(--blue-bg)}
.q-opt.sel{font-weight:600;color:var(--accent)}
.q-badge{font-size:11px;color:var(--muted);background:var(--border);
  padding:1px 6px;border-radius:99px}
.as-of{margin-left:auto;font-size:12px;color:var(--muted);white-space:nowrap}

/* ---- Tab bar ---- */
.tabs-bar{display:flex;padding:0 20px;overflow-x:auto;
  scrollbar-width:none;-ms-overflow-style:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;border:none;background:none;font-size:13px;font-weight:500;
  cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;
  white-space:nowrap;display:flex;align-items:center;gap:6px;
  transition:color .15s,border-color .15s;outline:none;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-cnt{font-size:11px;font-weight:600;padding:1px 7px;border-radius:99px;
  background:var(--border);color:var(--muted)}
.tab-cnt.urgent{background:var(--red-bg);color:var(--red-text)}
.tab-cnt.warn{background:var(--yellow-bg);color:var(--yellow-text)}
.tab-cnt.clear{background:var(--green-bg);color:var(--green-text)}

/* ---- Tab panes ---- */
.tab-pane{display:none;padding:24px 24px 80px}
.tab-pane.active{display:block}
.pane-title{font-size:16px;font-weight:600;margin-bottom:4px;
  display:flex;align-items:center;gap:10px}
.pane-desc{font-size:13px;color:var(--muted);margin-bottom:16px}

/* ---- KPI cards ---- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;
  margin-bottom:28px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;box-shadow:var(--shadow)}
.kpi-card.green{border-left:3px solid var(--green)}
.kpi-card.red{border-left:3px solid var(--red)}
.kpi-card.blue{border-left:3px solid var(--accent)}
.kpi-card.yellow{border-left:3px solid var(--yellow)}
.kl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.kv{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px}
.kn{font-size:12px;color:var(--muted);line-height:1.4}
.kpi-bar{height:4px;background:var(--border);border-radius:2px;margin:6px 0 4px}
.kpi-bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .4s ease}
.kpi-card.green .kpi-bar-fill{background:var(--green)}
.kpi-card.red .kpi-bar-fill{background:var(--red)}
.kpi-card.yellow .kpi-bar-fill{background:var(--yellow)}

/* ---- Sprint overview section ---- */
.overview-section{margin-bottom:28px}
.section-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px}

/* ---- Alert banner ---- */
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;
  display:flex;align-items:center;gap:8px}
.alert-red{background:var(--red-bg);color:var(--red-text);border:1px solid #fecaca}
.alert-yellow{background:var(--yellow-bg);color:var(--yellow-text);border:1px solid #fde68a}
.alert-green{background:var(--green-bg);color:var(--green-text);border:1px solid #bbf7d0}
.alert a{color:inherit;font-weight:600;text-decoration:none}
.alert a:hover{text-decoration:underline}

/* ---- Tables ---- */
/* .tw must NOT have overflow set — any overflow value traps sticky children inside it */
.tw{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow)}
/* horizontal scroll lives here, inside the sticky toolbar but outside thead */
.tw-body{overflow-x:auto}
.ttb{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;
  gap:8px;align-items:center;flex-wrap:wrap;background:var(--surface);
  position:sticky;top:var(--hdr);z-index:4;
  border-radius:var(--radius) var(--radius) 0 0}
.tf{padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;
  flex:1;min-width:150px;max-width:260px;outline:none}
.tf:focus{border-color:var(--accent)}
.tc{font-size:12px;color:var(--muted);white-space:nowrap}
.jl{color:var(--muted);font-size:11px;text-decoration:none;padding:4px 8px;
  border:1px solid var(--border);border-radius:6px;white-space:nowrap;margin-left:auto}
.jl:hover{background:var(--blue-bg);color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg);padding:7px 10px;text-align:left;font-weight:600;
  font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);
  white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
.si{font-size:10px;margin-left:3px}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafbfc}
td{padding:7px 10px;vertical-align:middle}
.ik{font-family:monospace;font-size:12px;font-weight:600;color:var(--accent);
  text-decoration:none;white-space:nowrap}
.ik:hover{text-decoration:underline}
.is{max-width:400px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.er td{text-align:center;padding:24px;color:var(--muted);font-style:italic}

/* ---- Badges / chips ---- */
.b{display:inline-block;font-size:11px;font-weight:500;padding:2px 7px;
  border-radius:99px;white-space:nowrap}
.bd{background:var(--green-bg);color:var(--green-text)}
.bi{background:var(--blue-bg);color:var(--blue-text)}
.bt{background:var(--border);color:var(--muted)}
.bbug{background:var(--red-bg);color:var(--red-text)}
.bstory{background:var(--green-bg);color:var(--green-text)}
.btask{background:var(--blue-bg);color:var(--blue-text)}
.bhi{background:var(--red-bg);color:var(--red-text)}
.bmed{background:var(--yellow-bg);color:var(--yellow-text)}
.blo{background:var(--green-bg);color:var(--green-text)}
.b.vlink{text-decoration:none;cursor:pointer}
.b.vlink:hover{filter:brightness(.92);text-decoration:underline}
.chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
.chip-blue{background:#dbeafe;color:#1d4ed8}
.chip-green{background:#dcfce7;color:#16a34a}
.chip-neutral{background:var(--border);color:var(--muted)}
.chip-yellow{background:#fef3c7;color:#92400e}
.chip-red{background:#fee2e2;color:#dc2626}
.vv{display:flex;flex-wrap:wrap;gap:3px}

/* ---- Back to top ---- */
#btt{position:fixed;bottom:28px;right:28px;width:38px;height:38px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;font-size:17px;line-height:1;
  cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;transition:opacity .2s;z-index:50}
#btt.vis{opacity:1;pointer-events:auto}
#btt:hover{background:var(--accent-dark)}

.nodata{text-align:center;padding:60px 24px;color:var(--muted)}

/* ---- Trend charts ---- */
.trend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:28px}
.trend-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.trend-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.trend-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.trend-val{font-size:22px;font-weight:700;line-height:1.1}
.trend-delta{font-size:12px;font-weight:600;padding:3px 8px;border-radius:99px;white-space:nowrap}
.trend-delta.pos{background:var(--green-bg);color:var(--green-text)}
.trend-delta.neg{background:var(--red-bg);color:var(--red-text)}
.trend-delta.flat{background:var(--border);color:var(--muted)}
</style>
</head>

const ordered=Object.keys(QS);
let cur=ordered[0]||"";
let curTab="overview";

/* ---- Escape ---- */
function e(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

/* ---- Date formatting ---- */
function fmtDate(s,short){
  if(!s)return"";
  const d=new Date(s+"T12:00:00");
  return short
    ?d.toLocaleDateString("en-GB",{day:"numeric",month:"short"})
    :d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
}

/* ---- Badge helpers ---- */
function scls(cat){return cat==="done"?"bd":cat==="indeterminate"?"bi":"bt"}
function tcls(t){return t==="Bug"?"bbug":t==="Story"?"bstory":t==="Task"?"btask":"bt"}
function pcls(p){if(!p)return"bt";p=p.toLowerCase();return(p==="highest"||p==="high")?"bhi":p==="medium"?"bmed":"blo"}

/* ---- Quarter dropdown ---- */
function buildOpts(filter){
  const lc=(filter||"").toLowerCase();
  const el=document.getElementById("q-opts");
  el.innerHTML=ordered.filter(q=>q.toLowerCase().includes(lc)).map(q=>{
    const d=QS[q];const sc=q===cur?" sel":"";
    const n=(d.sprints||[]).length;
    return`<div class="q-opt${sc}" data-q="${e(q)}">${e(q)}<span class="q-badge">${n} sprint${n!==1?"s":""}</span></div>`;
  }).join("")||`<div class="q-opt" style="color:var(--muted);cursor:default">No results</div>`;
  el.querySelectorAll(".q-opt[data-q]").forEach(o=>{
    o.addEventListener("click",()=>{cur=o.dataset.q;closeDd();render(cur);});
  });
}
function openDd(){document.getElementById("q-dd").classList.add("open");buildOpts("");document.getElementById("q-search").value="";document.getElementById("q-search").focus();}
function closeDd(){document.getElementById("q-dd").classList.remove("open");document.getElementById("q-input").value=cur;}
document.getElementById("q-input").addEventListener("click",()=>{document.getElementById("q-dd").classList.contains("open")?closeDd():openDd();});
document.getElementById("q-search").addEventListener("input",function(){buildOpts(this.value);});
document.addEventListener("click",ev=>{if(!ev.target.closest(".qs"))closeDd();});

/* ---- Header height sync ---- */
function _syncHdr(){
  const h=document.getElementById("site-header")?.offsetHeight;
  if(h)document.documentElement.style.setProperty("--hdr",h+"px");
}
new ResizeObserver(_syncHdr).observe(document.getElementById("site-header"));

/* ---- Back to top ---- */
window.addEventListener("scroll",()=>{document.getElementById("btt").classList.toggle("vis",window.scrollY>300);},{passive:true});

/* ---- Tab switching ---- */
function showTab(id){
  curTab=id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===id));
  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.toggle("active",p.dataset.pane===id));
  window.scrollTo({top:0,behavior:"instant"});
}

  const fid="f"+(_tid++);const bid="b"+_tid;const cid="c"+_tid;

    <span class="tc" id="${cid}">${rows.length} item${rows.length!==1?"s":""}</span>
    ${jiraUrl?`<a class="jl" href="${e(jiraUrl)}" target="_blank">Open in Jira ↗</a>`:""}
  </div>`;
  const head=cols.map((c,i)=>`<th data-i="${i}">${e(c.h)}<span class="si"></span></th>`).join("");
  const body=rows.length
    ?rows.map(r=>`<tr>${cols.map(c=>`<td>${c.r(r)}</td>`).join("")}</tr>`).join("")
    :`<tr class="er"><td colspan="${cols.length}">No items</td></tr>`;
  const html=`<div class="tw">${toolbar}<div class="tw-body"><table><thead><tr>${head}</tr></thead><tbody id="${bid}">${body}</tbody></table></div></div>`;
  setTimeout(()=>{
    const fi=document.getElementById(fid);const tb=document.getElementById(bid);const ct=document.getElementById(cid);
    if(!fi||!tb)return;
    fi.addEventListener("input",()=>{
      const lc=fi.value.toLowerCase();let vis=0;
      tb.querySelectorAll("tr:not(.er)").forEach(r=>{const show=r.textContent.toLowerCase().includes(lc);r.style.display=show?"":"none";if(show)vis++;});
      if(ct)ct.textContent=fi.value?`${vis} of ${rows.length}`:`${rows.length} item${rows.length!==1?"s":""}`;
    });
    let ss={};
    tb.closest("table").querySelectorAll("thead th").forEach(th=>{
      th.addEventListener("click",()=>{
        const i=+th.dataset.i;const asc=ss[i]!==true;ss={};ss[i]=asc;
        tb.closest("table").querySelectorAll(".si").forEach(s=>s.textContent="");
        th.querySelector(".si").textContent=asc?" ▲":" ▼";
        const rs=Array.from(tb.querySelectorAll("tr:not(.er)"));
        rs.sort((a,b)=>{const av=a.cells[i]?.textContent.trim()??"";const bv=b.cells[i]?.textContent.trim()??"";return asc?av.localeCompare(bv,undefined,{numeric:true}):bv.localeCompare(av,undefined,{numeric:true});});
        rs.forEach(r=>tb.appendChild(r));
      });
    });
  },0);
  return html;
}

/* ---- Column helpers ---- */
function issueCols(extra){
  return[
    {h:"Key",     r:r=>`<a class="ik" href="${e(r.url)}" target="_blank">${e(r.key)}</a>`},
    {h:"Type",    r:r=>`<span class="b ${tcls(r.type)}">${e(r.type)}</span>`},
    {h:"Summary", r:r=>`<div class="is" title="${e(r.summary)}">${e(r.summary)}</div>`},
    {h:"Assignee",r:r=>e(r.assignee)},
    ...(extra||[]),
    {h:"Status",  r:r=>`<span class="b ${scls(r.status_cat)}">${e(r.status)}</span>`},
  ];
}
const priCol={h:"Priority",r:r=>r.priority?`<span class="b ${pcls(r.priority)}">${e(r.priority)}</span>`:"—"};
const lblCol={h:"Labels",  r:r=>(r.labels||[]).filter(l=>l!=="Out_Of_Sprint").map(l=>`<span class="b bt">${e(l)}</span>`).join(" ")||"—"};

/* ---- Pane wrapper ---- */
function pane(id,content){
  return`<div class="tab-pane" data-pane="${id}">${content}</div>`;
}

/* ---- Main render ---- */
function render(qk){
  const D=QS[qk];cur=qk;
  document.getElementById("q-input").value=qk;
  document.title="DLK Quarters — "+qk;

  if(!D){document.getElementById("dash").innerHTML=`<div class="nodata">No data for ${e(qk)}</div>`;return;}
  const {kpis,notes,sprints}=D;
  const iss=kpis.issues||{};
  const jb=kpis.jira_base||"";
  const verIds=kpis.version_ids||{};
  const oa=kpis.oos_open;
  const ids=(kpis.sprint_ids||[]).join(", ");
  const base=`project = DLK AND sprint in (${ids})`;

  /* Active sprint label in logo */
  const activeSprint=(sprints||[]).find(s=>s.state==="active");
  document.getElementById("hdr-sprint").textContent=activeSprint?" · "+activeSprint.name:"";
  document.getElementById("as-of").textContent="Updated: "+(kpis.as_of||"");

  /* Version column — needs jb and verIds closure */
  const verCol={h:"Fix Ver.",r:r=>{
    if(!(r.fix_versions||[]).length)return"—";
    return`<div class="vv">${r.fix_versions.map(v=>{
      const vid=verIds[v];
      if(vid&&jb){const url=`${jb}/projects/DLK/versions/${vid}/tab/release-report-all-issues`;return`<a class="b bstory vlink" href="${e(url)}" target="_blank">${e(v)}</a>`;}
      return`<span class="b bstory">${e(v)}</span>`;
    }).join("")}</div>`;
  }};

  /* Column sets */
  const allCols =issueCols([priCol,verCol,lblCol]);
  const oosCols =issueCols([priCol,lblCol]);
  const relCols =issueCols([verCol,lblCol]);
  const ipCols  =issueCols([priCol]);

  /* Jira URLs per section */
  function jUrl(jql){return jb?`${jb}/issues/?jql=${encodeURIComponent(jql)}`:null;}

  /* OOS alert (reused in multiple panes) */
  let alertLinks="";
  if(oa>0&&kpis.oos_open_detail){
    const shown=kpis.oos_open_detail.slice(0,3);
    alertLinks=" — "+shown.map(i=>`<a href="${e(jb+"/browse/"+i.key)}" target="_blank">${e(i.key)}</a>`).join(", ");
    if(kpis.oos_open_detail.length>3)alertLinks+=` +${kpis.oos_open_detail.length-3} more`;
  }
  const oosAlert=oa>2
    ?`<div class="alert alert-red">⚠ ${oa} open out-of-sprint items need attention${alertLinks}.</div>`
    :oa>0
    ?`<div class="alert alert-yellow">⚠ ${oa} open out-of-sprint item${oa>1?"s":""} pending${alertLinks}.</div>`
    :`<div class="alert alert-green">✓ All out-of-sprint items resolved.</div>`;

  /* KPI cards */
  const cr=kpis.completion_rate;
  const crC=cr>=80?"green":cr>=60?"yellow":"red";
  const oosC=oa===0?"green":oa>2?"red":"yellow";
  const cards=[
    {l:"Total Items",           v:kpis.total,                                        n:notes.total,            c:"blue"},
    {l:"Completed / Released",  v:kpis.completed,                                    n:notes.completed,        c:"green"},
    {l:"Completion Rate",       v:cr+"%",                                            n:notes.completion_rate,  c:crC,   bar:cr},
    {l:"Releases Shipped",      v:kpis.releases_shipped,                             n:notes.releases_shipped, c:"blue"},
    {l:"Out-of-Sprint (total)", v:kpis.oos_total,                                    n:notes.oos_total,        c:"yellow"},
    {l:"Open OOS Items",        v:oa,                                                n:notes.oos_open,         c:oosC},
    {l:"Bug / Story / Task",    v:`${kpis.bugs} / ${kpis.stories} / ${kpis.tasks}`, n:notes.type_split,       c:"blue"},
    {l:"Avg Releases / Sprint", v:kpis.avg_releases_per_sprint,                      n:notes.avg_releases,     c:"blue"},
  ];
  const kpiHtml=`<div class="kpi-grid">${cards.map(c=>`
    <div class="kpi-card ${c.c}">
      <div class="kl">${e(c.l)}</div>
      <div class="kv">${e(String(c.v))}</div>
      ${c.bar!==undefined?`<div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(c.bar,100)}%"></div></div>`:""}
      <div class="kn">${e(c.n||"")}</div>
    </div>`).join("")}</div>`;

  /* Sprint table */
  const sRows=(sprints||[]).slice().reverse().map(s=>{
    const start=fmtDate(s.start_date,true);const end=fmtDate(s.end_date,false);
    const dates=start&&end?`${start} – ${end}`:start?`From ${start}`:"";
    const chip=`<span class="chip chip-${e(s.status_color)}">${e(s.status_label)}</span>`;
    const surl=(jb&&s.state==="active")?`${jb}/jira/software/projects/DLK/boards/${e(kpis.board_id||"")}?sprint=${e(String(s.id))}`:null;
    const nm=surl?`<a class="ik" href="${e(surl)}" target="_blank">${e(s.name)}</a>`:e(s.name);
    return`<tr><td>${nm}</td><td style="white-space:nowrap">${e(dates)}</td><td>${chip}</td><td>${e((s.state||"").charAt(0).toUpperCase()+(s.state||"").slice(1))}</td></tr>`;
  }).join("")||`<tr class="er"><td colspan="4">No sprints</td></tr>`;
  const sprintTable=`<div class="tw"><div class="tw-body"><table>
    <thead><tr><th>Sprint</th><th>Dates</th><th>Status</th><th>State</th></tr></thead>
    <tbody>${sRows}</tbody>
  </table></div></div>`;

  /* Build all tab panes */
  const ipRows=iss.in_progress||[];
  const oosOpenRows=iss.oos_open||[];
  const oosAllRows=iss.oos_all||[];
  const relRows=iss.released||[];
  const allRows=iss.all||[];

  const dashHtml=[
    pane("overview",`
      ${oosAlert}
      <div class="pane-title">Quarter at a Glance</div>
      <div class="pane-desc">KPIs and sprint summary for ${e(qk)}.</div>
      ${kpiHtml}
      <div class="section-label">Sprints</div>
      ${sprintTable}
    `),
    pane("inprogress",`
      <div class="pane-title">In Progress <span class="tab-cnt">${ipRows.length}</span></div>
      <div class="pane-desc">Items currently being worked on across all sprints this quarter.</div>
      ${mkTable(ipCols,ipRows,jUrl(base+" AND statusCategory != Done ORDER BY status ASC, assignee ASC"))}
    `),
    pane("oosopen",`
      ${oosAlert}
      <div class="pane-title">Open OOS Items <span class="tab-cnt ${oa>2?"urgent":oa>0?"warn":"clear"}">${oa}</span></div>
      <div class="pane-desc">Out-of-sprint items that are still open and need resolution.</div>
      ${mkTable(oosCols,oosOpenRows,jUrl(base+" AND labels = Out_Of_Sprint AND statusCategory != Done ORDER BY priority ASC"))}
    `),
    pane("oos",`
      <div class="pane-title">Out-of-Sprint Items <span class="tab-cnt">${oosAllRows.length}</span></div>
      <div class="pane-desc">All items flagged Out_Of_Sprint this quarter, including resolved ones.</div>
      ${mkTable(oosCols,oosAllRows,jUrl(base+" AND labels = Out_Of_Sprint ORDER BY status ASC"))}
    `),
    pane("released",`
      <div class="pane-title">Released <span class="tab-cnt">${relRows.length}</span></div>
      <div class="pane-desc">Items with status Released, Closed, or Merged that have a fix version attached.</div>
      ${mkTable(relCols,relRows,jUrl(base+" AND status in (Released,Closed,Merged) AND fixVersion is not EMPTY ORDER BY fixVersions ASC"))}
    `),
    pane("all",`
      <div class="pane-title">All Items <span class="tab-cnt">${allRows.length}</span></div>
      <div class="pane-desc">Every issue in scope across all ${e(qk)} sprints.</div>
      ${mkTable(allCols,allRows,jUrl(base+" ORDER BY sprint ASC, status ASC"))}
    `),
    pane("time",`
      <div class="pane-title">Time Tracking</div>
      <div class="pane-desc">Logged vs estimated hours across all sprint items. Items without estimates affect accuracy reporting.</div>
      ${(()=>{
        const tl=kpis.time_logged_h||0, te=kpis.time_estimated_h||0;
        const acc=kpis.estimate_accuracy_pct||0, vari=kpis.estimate_variance_pct||0;
        const ne=kpis.no_estimate_count||0, nePct=kpis.no_estimate_pct||0;
        const nl=kpis.no_log_count||0;
        const variStr=(vari>=0?'+':'')+vari+'%';
        const variC=Math.abs(vari)<10?'green':Math.abs(vari)<25?'yellow':'red';
        const neC=nePct===0?'green':nePct<20?'yellow':'red';
        const timeCards=[
          {l:'Hours Logged',       v:tl+'h',      n:(notes.time_logged||''),    c:'blue'},
          {l:'Hours Estimated',    v:te+'h',       n:te?'':'No estimates set.',   c:'blue'},
          {l:'Estimate Accuracy',  v:acc+'%',      n:'Logged vs estimated. 100% = exact.',c:variC},
          {l:'Variance',           v:variStr,      n:'Over=positive, under=negative.',    c:variC},
          {l:'No Estimate',        v:ne,           n:nePct+'% of items lack an estimate.'+(notes.no_estimate?(' '+notes.no_estimate):''),c:neC},
          {l:'No Time Logged',     v:nl,           n:'Items with zero time recorded.',    c:nl===0?'green':'yellow'},
        ];
        const timeKpiHtml='<div class="kpi-grid">'+timeCards.map(c=>`
          <div class="kpi-card ${c.c}">
            <div class="kl">${e(c.l)}</div>
            <div class="kv">${e(String(c.v))}</div>
            <div class="kn">${e(c.n)}</div>
          </div>`).join('')+'</div>';

        // Estimate vs actual bar comparison
        const maxH=Math.max(tl,te,1);
        const barW=v=>Math.round((v/maxH)*100);
        const compBar=te?`<div class="section-label" style="margin-bottom:8px">Logged vs Estimated</div>
          <div style="display:flex;flex-direction:column;gap:6px;max-width:480px;margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="width:90px;font-size:12px;color:var(--muted);text-align:right">Estimated</span>
              <div style="flex:1;background:var(--border);border-radius:3px;height:16px;overflow:hidden">
                <div style="width:${barW(te)}%;height:100%;background:var(--accent);border-radius:3px"></div>
              </div>
              <span style="width:50px;font-size:12px;font-weight:600">${e(te+'h')}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <span style="width:90px;font-size:12px;color:var(--muted);text-align:right">Logged</span>
              <div style="flex:1;background:var(--border);border-radius:3px;height:16px;overflow:hidden">
                <div style="width:${barW(tl)}%;height:100%;background:${vari>25?'var(--red)':vari>0?'var(--yellow)':'var(--green)'};border-radius:3px"></div>
              </div>
              <span style="width:50px;font-size:12px;font-weight:600">${e(tl+'h')}</span>
            </div>
          </div>`:'';

        const neRows=iss.no_estimate||[];
        const neAlert=nePct>20
          ?`<div class="alert alert-red">⚠ ${ne} items (${nePct}%) have no time estimate — accuracy reporting is skewed.</div>`
          :nePct>0
          ?`<div class="alert alert-yellow">⚠ ${ne} items (${nePct}%) have no time estimate.</div>`
          :`<div class="alert alert-green">✓ All items have time estimates.</div>`;

        const neCols=issueCols([priCol,{h:'Logged',r:r=>r.logged_h?r.logged_h+'h':'—'}]);
        return timeKpiHtml+compBar+neAlert
          +'<div class="section-label" style="margin-bottom:10px">Items Without Estimates</div>'
          +mkTable(neCols,neRows,jUrl(base+' AND originalEstimate is EMPTY ORDER BY status ASC'));
      })()}
    `),
    pane("trends",`
      <div class="pane-title">Trends</div>
      <div class="pane-desc">Quarter-on-quarter movement across key metrics. Green = improving, red = declining.</div>
      ${renderTrends()}
    `),
  ].join("");

  document.getElementById("dash").innerHTML=dashHtml;

  /* Tab bar with counts */
  const tabDefs=[
    {id:"overview",   label:"Overview"},
    {id:"inprogress", label:"In Progress",   cnt:ipRows.length,    cls:""},
    {id:"oosopen",    label:"Open OOS",      cnt:oa,               cls:oa>2?"urgent":oa>0?"warn":"clear"},
    {id:"oos",        label:"Out-of-Sprint", cnt:oosAllRows.length,cls:""},
    {id:"released",   label:"Released",      cnt:relRows.length,   cls:""},
    {id:"all",        label:"All Items",     cnt:allRows.length,   cls:""},
    {id:"time",       label:"Time"},
    {id:"trends",     label:"Trends"},
  ];
  document.getElementById("tabs-bar").innerHTML=tabDefs.map(t=>{
    const badge=t.cnt!==undefined?`<span class="tab-cnt ${t.cls}">${t.cnt}</span>`:"";
    return`<button class="tab" data-tab="${t.id}">${e(t.label)}${badge}</button>`;
  }).join("");
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>showTab(t.dataset.tab)));

  /* Sync --hdr with actual header height so toolbar sticky offset is correct */
  _syncHdr();

  showTab("overview");
}

/* ---- Trend charts ---- */
function mkLineChart(values,labels,higherIsBetter,lastIsWip){
  const n=values.length;
  if(n<2)return'<p style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0">Not enough data</p>';
  const W=300,H=90,pL=36,pR=12,pT=10,pB=22;
  const cW=W-pL-pR,cH=H-pT-pB;
  const min=Math.min(...values),max=Math.max(...values),span=max-min||1;
  const cx=i=>pL+(n<2?cW/2:(i/(n-1))*cW);
  const cy=v=>pT+cH-((v-min)/span)*cH;
  // Trend colour based on completed points only (ignore WIP last point for colouring)
  const refValues=lastIsWip?values.slice(0,-1):values;
  const trend=refValues.length>1?refValues[refValues.length-1]-refValues[0]:0;
  const improving=higherIsBetter===null?null:(higherIsBetter?trend>=0:trend<=0);
  const stroke=trend===0?'#94a3b8':improving?'#22c55e':'#ef4444';
  const fill=trend===0?'rgba(148,163,184,.1)':improving?'rgba(34,197,94,.12)':'rgba(239,68,68,.12)';
  const fmt=v=>Number.isInteger(v)?v:v.toFixed(1);
  const midY=(pT+(pT+cH))/2;
  const grid=`<line x1="${pL}" y1="${midY.toFixed(1)}" x2="${W-pR}" y2="${midY.toFixed(1)}" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>`;
  const yLbls=`<text x="${pL-4}" y="${(pT+6).toFixed(0)}" text-anchor="end" font-size="9" fill="#94a3b8">${fmt(max)}</text>`
             +`<text x="${pL-4}" y="${(pT+cH).toFixed(0)}" text-anchor="end" font-size="9" fill="#94a3b8">${fmt(min)}</text>`;
  const xLbls=labels.map((l,i)=>`<text x="${cx(i).toFixed(1)}" y="${H-3}" text-anchor="middle" font-size="9" fill="#94a3b8">${e(l)}</text>`).join('');
  // Solid line for completed points, dashed segment to WIP point
  const solidPts=values.map((v,i)=>`${cx(i).toFixed(1)},${cy(v).toFixed(1)}`);
  const wipPts=lastIsWip?solidPts.slice(-2).join(' '):'';
  const mainPts=lastIsWip?solidPts.slice(0,-1).join(' '):solidPts.join(' ');
  const area=`${pL},${(pT+cH).toFixed(1)} ${mainPts} ${cx(lastIsWip?n-2:n-1).toFixed(1)},${(pT+cH).toFixed(1)}`;
  const dots=values.map((v,i)=>{
    const isLast=i===n-1,isWip=isLast&&lastIsWip;
    // WIP dot: hollow with dashed stroke; last completed: filled
    if(isWip)return`<circle cx="${cx(i).toFixed(1)}" cy="${cy(v).toFixed(1)}" r="4" fill="var(--surface)" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,2"/>`;
    return`<circle cx="${cx(i).toFixed(1)}" cy="${cy(v).toFixed(1)}" r="${isLast?4:2.5}" fill="${isLast?stroke:'var(--surface)'}" stroke="${stroke}" stroke-width="1.5"/>`;
  }).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block" xmlns="http://www.w3.org/2000/svg">`
    +grid+yLbls
    +`<polygon points="${area}" fill="${fill}"/>`
    +(mainPts?`<polyline points="${mainPts}" fill="none" stroke="${stroke}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`:'')
    +(wipPts?`<polyline points="${wipPts}" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round"/>`:'')
    +dots+xLbls+`</svg>`;
}

function renderTrends(){
  const now=new Date();
  const curLabel=`Q${Math.floor(now.getMonth()/3)+1} ${now.getFullYear()}`;
  const WINDOW=4; // rolling quarters shown
  // All quarters oldest→newest; keep last WINDOW, always append current if present
  const allOldestFirst=Object.keys(QS).slice().reverse();
  const completed=allOldestFirst.filter(q=>q!==curLabel);
  const hasCurrent=QS[curLabel]!==undefined;
  const windowed=completed.slice(-WINDOW);
  // If current quarter exists, append it (marked WIP) but only if we have room or it's the only one
  const qs=hasCurrent?[...windowed,curLabel]:windowed;
  const lastIsWip=hasCurrent;
  if(qs.length<2)return'<div class="nodata">At least 2 quarters of data needed for trend charts.</div>';
  const lbls=qs.map(q=>q.replace(' ','·'));
  const M=[
    {k:'completion_rate',       lbl:'Completion Rate',     fmt:v=>v+'%', hi:true},
    {k:'completed',             lbl:'Items Completed',     fmt:v=>v,     hi:true},
    {k:'total',                 lbl:'Total Items',          fmt:v=>v,     hi:null},
    {k:'releases_shipped',      lbl:'Releases Shipped',     fmt:v=>v,     hi:true},
    {k:'oos_pct',               lbl:'OOS Rate',             fmt:v=>v+'%', hi:false},
    {k:'bug_pct',               lbl:'Bug %',                fmt:v=>v+'%', hi:false},
    {k:'time_logged_h',         lbl:'Hours Logged',         fmt:v=>v+'h', hi:null},
    {k:'estimate_accuracy_pct', lbl:'Estimate Accuracy',   fmt:v=>v+'%', hi:null},
    {k:'no_estimate_pct',       lbl:'Missing Estimates',   fmt:v=>v+'%', hi:false},
  ];
  const wipNote=hasCurrent?`<p style="font-size:12px;color:var(--muted);margin-bottom:16px">` +
    `<span style="display:inline-flex;align-items:center;gap:6px">` +
    `<svg width="24" height="10" viewBox="0 0 24 10"><line x1="0" y1="5" x2="24" y2="5" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/></svg>` +
    `${e(curLabel)} is in progress — shown dashed, excluded from trend direction.</span></p>`:'';
  return wipNote+'<div class="trend-grid">'+M.map(m=>{
    const vals=qs.map(q=>+(QS[q]?.kpis[m.k]??0));
    // Delta uses last 2 completed points only
    const compVals=lastIsWip?vals.slice(0,-1):vals;
    const cur=compVals[compVals.length-1]??vals[vals.length-1];
    const prev=compVals[compVals.length-2]??cur;
    const d=cur-prev;
    const improving=m.hi===null?null:(m.hi?d>=0:d<=0);
    let dcls='flat',dstr='—';
    if(d!==0){
      dcls=m.hi===null?'flat':improving?'pos':'neg';
      dstr=(d>0?'+':'')+(Number.isInteger(d)?d:d.toFixed(1));
    }
    const dispVal=lastIsWip?vals[vals.length-1]:cur;
    return`<div class="trend-card">`
      +`<div class="trend-hdr"><div><div class="trend-lbl">${e(m.lbl)}</div>`
      +`<div class="trend-val">${e(String(m.fmt(dispVal)))}</div></div>`
      +`<span class="trend-delta ${dcls}">${e(dstr)}</span></div>`
      +mkLineChart(vals,lbls,m.hi,lastIsWip)
      +`</div>`;
  }).join('')+'</div>';
}

/* ---- Init ---- */
if(!ordered.length){
  document.getElementById("dash").innerHTML=`<div class="nodata">No quarter data available.</div>`;
}else{render(ordered[0]);}
</script>
