- sensor:

    - name: "VWCE Cost Basis"
      unique_id: vwce_cost_basis
      unit_of_measurement: "EUR"
      state_class: total
      state: >
        {{ '%.2f' | format(states('input_number.ibkr_vwce_cost_basis') | float(0)) }}

    - name: "VWCE Cost Per Share"
      unique_id: vwce_cost_per_share
      unit_of_measurement: "EUR"
      state_class: measurement
      availability: >
        {{ states('input_number.ibkr_vwce_quantity') not in ['unknown','unavailable',''] and
           (states('input_number.ibkr_vwce_quantity') | float(0)) > 0 }}
      state: >
        {{ '%.2f' | format(
            (states('input_number.ibkr_vwce_cost_basis') | float(0)) /
            (states('input_number.ibkr_vwce_quantity') | float(0))
        ) }}

    - name: "VWCE Price"
      unique_id: vwce_price
      unit_of_measurement: "EUR"
      state_class: measurement
      availability: >
        {% set p = states('sensor.yahoofinance_vwce_de') %}
        {{ p not in ['unknown','unavailable','none',''] and (p | float(0)) > 0 }}
      state: >
        {{ '%.2f' | format(states('sensor.yahoofinance_vwce_de') | float(0)) }}

    - name: "VWCE Profit"
      unique_id: vwce_profit
      unit_of_measurement: "EUR"
      state_class: measurement
      availability: >
        {% set p = states('sensor.yahoofinance_vwce_de') %}
        {% set q = states('input_number.ibkr_vwce_quantity') %}
        {% set c = states('input_number.ibkr_vwce_cost_basis') %}
        {{ p not in ['unknown', 'unavailable', 'none', ''] and (p | float(0)) > 0
            and q not in ['unknown', 'unavailable', 'none', '']
            and c not in ['unknown', 'unavailable', 'none', ''] }}
      state: >
        {{ '%.2f' | format(
            ((states('input_number.ibkr_vwce_quantity') | float(0)) *
             (states('sensor.yahoofinance_vwce_de') | float(0))) -
            (states('input_number.ibkr_vwce_cost_basis') | float(0))
        ) }}

    - name: "VWCE Quantity"
      unique_id: vwce_quantity
      unit_of_measurement: "shares"
      state_class: measurement
      state: >
        {{ '%.4f' | format(states('input_number.ibkr_vwce_quantity') | float(0)) }}

    - name: "VWCE Value"
      unique_id: vwce_value
      unit_of_measurement: "EUR"
      state_class: total
      availability: >
        {% set p = states('sensor.yahoofinance_vwce_de') %}
        {{ p not in ['unknown', 'unavailable', 'none', ''] and (p | float(0)) > 0 }}
      state: >
        {{ '%.2f' | format(
            (states('input_number.ibkr_vwce_quantity') | float(0)) *
            (states('sensor.yahoofinance_vwce_de') | float(0))
        ) }}