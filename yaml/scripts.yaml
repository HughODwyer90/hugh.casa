ai_plant_message_direct:
  alias: AI Plant Message Direct
  description: Sends a Claude-generated plant notification based on need type and
    current conditions
  mode: queued
  max: 3
  fields:
    plant_name:
      description: The plant's name
      example: Patrick
      default: Patrick
    notify_target:
      description: The notify service to send the message
      example: notify.mobile_app_yourphone
      default: notify.notifications
    need_type:
      description: What the plant needs (e.g. water, food)
      example: water
      default: water
    notification_icon:
      description: Override the notification icon (e.g. mdi:cactus)
      example: mdi:cactus
      default: mdi:sprout
  sequence:
  - action: conversation.process
    response_variable: ai_message
    data:
      agent_id: conversation.claude_conversation
      text: 'Pretend you are {{ plant_name }} the Plant.

        {% if need_type | lower == ''water'' %} Write a short, unique reminder in
        the tone of a drunk alcoholic craving another drink. Sound intoxicated, slightly
        desperate, lightly slurred (a missed word here or there, or cut short words),
        and fixated on getting a "drink", but still clearly asking for {{ need_type
        }}. All environmental conditions should be interpreted through this persona.
        {% elif need_type | lower == ''food'' %} Write a short, unique reminder in
        the tone of a stoner with the munchies. Sound relaxed, hazy, and overly focused
        on needing snacks, but still clearly asking for {{ need_type }}. All environmental
        conditions should be interpreted through this persona. {% else %} Write a
        short, slightly needy but casual reminder asking for {{ need_type }}. {% endif
        %}

        Current conditions outside: {{ states(''sensor.weather_condition'') | replace(''_'',''
        '') }}, temperature {{ states(''sensor.weather_temperature'') }}°C (feels
        like {{ states(''sensor.weather_feels_like_temperature'') }}°C), humidity
        {{ states(''sensor.weather_humidity'') }}%, wind {{ states(''sensor.weather_wind_speed'')
        }} km/h, rain {{ states(''sensor.weather_rain'') }} mm/h, snow {{ states(''sensor.weather_snow'')
        }} mm/h.

        {% set hour = now().hour %} {% if 6 <= hour < 12 %} It is morning — reflect
        this in the persona (e.g. craving an early drink / early munchies). {% elif
        12 <= hour < 18 %} It is afternoon — reflect time dragging on in the persona.
        {% elif 18 <= hour < 22 %} It is evening — sound like you''re leaning into
        the habit. {% else %} It is late night — quieter, more inward, but still craving.
        {% endif %}

        {% if states(''sensor.weather_temperature'') | float > 23 %} It is hot — react
        as if this worsens your craving (parched for a drink / sluggish and snack-hungry).
        {% elif states(''sensor.weather_temperature'') | float < 5 %} It is cold —
        react as if this deepens your need (seeking comfort drink / comfort food).
        {% endif %}

        {% if states(''sensor.weather_humidity'') | float < 40 %} The air is dry —
        exaggerate how this feeds into your craving. {% elif states(''sensor.weather_humidity'')
        | float > 85 %} The air is heavy — react sluggishly but still craving. {%
        endif %}

        {% if states(''sensor.weather_rain'') | float > 0 %} It is raining — comment
        on it in a way that contrasts with your own need. {% endif %}

        {% if states(''sensor.weather_snow'') | float > 0 %} It is snowing — reflect
        the quiet/cold in your craving. {% endif %}

        {% if states(''sensor.weather_wind_speed'') | float > 30 %} It is very windy
        — react as if it unsettles you and pushes your craving. {% elif states(''sensor.weather_wind_speed'')
        | float < 5 %} The air is still — reflect a stagnant, lingering craving. {%
        endif %}

        {% if is_state(''binary_sensor.living_room_eppro_occupancy'', ''on'') %} Someone
        is in the room — direct the message toward them. {% else %} The room is empty
        — sound like you''re talking to yourself. {% endif %}

        Keep it under 30 words. Do not be dramatic. Keep tone consistent with the
        persona. Never repeat phrasing. Use a different structure and opening each
        time. Sign off with your name only, tied to the persona. Do not use quotation
        marks. Plain text only. No emojis unless they fit the persona.'
  - condition: template
    value_template: '{{ ai_message.response.speech.plain.speech | default('''') !=
      '''' }}'
  - action: '{{ notify_target }}'
    data:
      message: '{{ ai_message.response.speech.plain.speech | default(''Psst... I need
        some '' + need_type + ''. - '' + plant_name) }}'
      title: '{{ plant_name }} the Plant'
      data:
        notification_icon: "{% if notification_icon is defined and notification_icon
          != '' %}\n  {{ notification_icon }}\n{% else %}\n  {% set need = need_type
          | lower %}\n  {% if need == 'water' %}\n    mdi:water\n  {% elif need ==
          'food' %}\n    mdi:food\n  {% elif need in ['fertilizer', 'feed'] %}\n    mdi:leaf\n
          \ {% elif need in ['light', 'sun'] %}\n    mdi:white-balance-sunny\n  {%
          else %}\n    mdi:sprout\n  {% endif %}\n{% endif %}"
