        conditions:
        - condition: state
          entity_id: sensor.air_purifier_speed
          state: 'Off'
      - action: fan.turn_off
        target:
          entity_id: fan.air_purifier
    - conditions:
      - condition: template
        value_template: '{{ level | lower == ''low'' }}'
      sequence:
      - condition: not
        conditions:
        - condition: state
          entity_id: sensor.air_purifier_speed
          state: Low
      - action: fan.set_percentage
        target:
          entity_id: fan.air_purifier
        data:
          percentage: '{{ states(''input_number.fan_speed_low'') | int }}'
    - conditions:
      - condition: template
        value_template: '{{ level | lower == ''medium'' }}'
      sequence:
      - condition: not
        conditions:
        - condition: state
          entity_id: sensor.air_purifier_speed
          state: Medium
      - action: fan.set_percentage
        target:
          entity_id: fan.air_purifier
        data:
          percentage: '{{ states(''input_number.fan_speed_medium'') | int }}'
    - conditions:
      - condition: template
        value_template: '{{ level | lower == ''high'' }}'
      sequence:
      - condition: not
        conditions:
        - condition: state
          entity_id: sensor.air_purifier_speed
          state: High
      - action: fan.set_percentage
        target:
          entity_id: fan.air_purifier
        data:
          percentage: '{{ states(''input_number.fan_speed_high'') | int }}'
set_diffuser_color:
  alias: Set Diffuser Color
  description: Controls diffuser color and ensures Fixed lighting mode.
  fields:
    color:
      description: RGB color (list of 3 values)
      example: '[255, 0, 0]'
    brightness:
      description: Brightness percentage
      example: '100'
  sequence:
  - variables:
      rgb: '{{ color | default([255, 200, 150]) }}'
      bright: '{{ brightness | default(100) }}'
  - action: light.turn_on
    target:
      entity_id: light.aroma_diffuser
    data:
      rgb_color: '{{ rgb }}'
      brightness_pct: '{{ bright }}'
  - delay:
      seconds: 1
  - condition: template
    value_template: '{{ is_state(''select.aroma_diffuser_mood_lighting'', ''Cycle'')
      }}'
  - action: select.select_option
    target:
      entity_id: select.aroma_diffuser_mood_lighting
    data:
      option: Fixed
  - delay:
      milliseconds: 500
  - action: light.turn_on
    target:
      entity_id: light.aroma_diffuser
    data:
      rgb_color: '{{ rgb }}'
      brightness_pct: '{{ bright }}'
  mode: single
set_diffuser_color_flash:
  alias: Set Diffuser Color Flash
  description: Flash diffuser a color for a duration, then restore previous state.
  fields:
    color:
      description: RGB list
    brightness:
      description: Brightness percentage
    duration:
      description: Flash length in seconds
      default: 1
  sequence:
  - variables:
      was_off: '{{ is_state(''light.aroma_diffuser'', ''off'') }}'
      prev_rgb: '{{ state_attr(''light.aroma_diffuser'', ''rgb_color'') or [255,255,255]
        }}'
      prev_bri: '{{ state_attr(''light.aroma_diffuser'', ''brightness'') | int(0)
        }}'
      rgb: '{{ color }}'
      bright: '{{ brightness }}'
  - action: light.turn_on
    target:
      entity_id: light.aroma_diffuser
    data:
      rgb_color: '{{ rgb }}'
      brightness_pct: '{{ bright }}'
  - action: select.select_option
    target:
      entity_id: select.aroma_diffuser_mood_lighting
    data:
      option: Fixed
  - delay: '{{ duration }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ was_off }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.aroma_diffuser
    - conditions:
      - condition: template
        value_template: '{{ not was_off }}'
      sequence:
      - action: select.select_option
        target:
          entity_id: select.aroma_diffuser_mood_lighting
        data:
          option: Fixed
      - delay: 0.3
      - action: light.turn_on
        target:
          entity_id: light.aroma_diffuser
        data:
          rgb_color: '{{ prev_rgb }}'
          brightness: '{{ prev_bri }}'
  mode: single
recast_to_stereo_with_media:
  alias: Recast to Stereo with Media
  mode: single
  fields:
    media_id:
      description: Spotify URI/track id
  sequence:
  - target:
      entity_id: media_player.hugh_speaker_group_2
    data:
      media_type: track
      media_id: '{{ media_id }}'
      enqueue: play
      radio_mode: false
    action: music_assistant.play_media
occupancy_lights_with_scene_fallback:
  alias: Occupancy lights with scene fallback
  description: ''
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ is_state(occupancy_sensor, ''on'') and (direct_scene |
          default(false)) }}'
      sequence:
      - action: scene.turn_on
        target:
          entity_id: '{{ on_scene }}'
    - conditions:
      - condition: template
        value_template: '{{ is_state(occupancy_sensor, ''on'') }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: '{{ target_light }}'
        data:
          brightness_pct: '{{ brightness_pct | default(70) }}'
          transition: '{{ transition | default(2) }}'
      - delay:
          seconds: '{{ (transition | default(2)) | float + 0.2 }}'
      - action: scene.turn_on
        target:
          entity_id: '{{ on_scene }}'
    - conditions:
      - condition: template
        value_template: '{{ is_state(occupancy_sensor, ''off'') }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: '{{ target_light }}'
        data:
          transition: '{{ transition | default(2) }}'
      - delay:
          seconds: '{{ (transition | default(2)) | float + 0.2 }}'
      - action: scene.turn_on
        target:
          entity_id: '{{ off_scene }}'
  mode: single
