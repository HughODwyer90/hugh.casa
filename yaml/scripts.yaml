  mode: single
  sequence:
  - variables:
      cutoff_minutes: 60
      weekday_alarm_dt: '{% set t = today_at(states(''input_datetime.weekday_wake_up_alarm''))
        %} {{ t if t > now() else t + timedelta(days=1) }}'
      weekend_alarm_dt: '{% set t = today_at(states(''input_datetime.weekend_wake_up_alarm''))
        %} {{ t if t > now() else t + timedelta(days=1) }}'
      weekday_wfh_alarm_dt: '{% set t = today_at(states(''input_datetime.weekday_wfh_wake_up_alarm''))
        %} {{ t if t > now() else t + timedelta(days=1) }}'
      earliest_alarm_ts: "{{\n  [\n    as_timestamp(weekday_alarm_dt),\n    as_timestamp(weekend_alarm_dt),\n
        \   as_timestamp(weekday_wfh_alarm_dt)\n  ] | min\n}}"
